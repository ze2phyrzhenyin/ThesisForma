name: ThesisDocx Quality Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Restore
        run: dotnet restore ThesisDocx.slnx

      - name: Build
        run: dotnet build ThesisDocx.slnx --no-restore

      - name: Test
        run: dotnet test ThesisDocx.slnx --no-build

      - name: Quality Gate
        run: scripts/ci-quality-gate

      - name: Upload Quality Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: thesisdocx-quality-artifacts
          path: out/ci

